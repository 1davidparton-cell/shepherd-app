<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0" y2="1" gradientTransform="rotate(-15 0.5 0.5)" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#22304f"/>
      <stop offset="55%"  stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#121a30"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="120%" r="90%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="70%"  stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Gold glow rising from bottom -->
  <rect x="-51" y="138" width="614" height="358" fill="url(#glow)"/>

  <!-- Shepherd's crook — scaled to 512×512 canvas, crook centered -->
  <g transform="translate(275,286) scale(1.78) translate(-88,-112)">
    <g transform="rotate(8 65 150)">
      <path d="M58 172 L58 76 C58 42 104 42 102 80 C101 94 94 96 90 88"
        fill="none" stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
